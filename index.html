<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Meeting</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f0f0f;
      font-family:Arial, sans-serif;
      color:white;
    }

    .box{
      background:#1a1a1a;
      padding:30px;
      border-radius:20px;
      width:320px;
      text-align:center;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      outline:none;
      font-size:16px;
      margin-bottom:15px;
      background:#2b2b2b;
      color:white;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#4285F4;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.03);
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Join Meet</h1>

  <input 
    type="text" 
    id="meetCode" 
    placeholder="Paste Meet code or link"
  >

  <button onclick="joinMeet()">Join Meeting</button>
</div>

<script>
function joinMeet() {
    let input = document.getElementById("meetCode").value.trim();

    if (!input) {
        alert("Enter a Meet code first.");
        return;
    }

    // If user pasted full link
    if (input.startsWith("http")) {
        window.location.href = input;
        return;
    }

    // Otherwise assume it's a Meet code
    window.location.href = "https://meet.google.com/" + input;
}
</script>

</body>
</html>
