<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Meeting</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f0f0f;
      font-family:Arial, sans-serif;
      color:white;
      padding:20px;
    }

    .box{
      background:#1a1a1a;
      padding:30px;
      border-radius:20px;
      width:350px;
      text-align:center;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
      margin-bottom:10px;
    }

    .guide{
      font-size:14px;
      color:#bdbdbd;
      margin-bottom:20px;
      line-height:1.5;
    }

    .example{
      background:#2a2a2a;
      padding:10px;
      border-radius:10px;
      margin-top:10px;
      word-break:break-all;
      font-size:13px;
      color:#8ab4f8;
    }

    .highlight{
      color:#00ff99;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      outline:none;
      font-size:16px;
      margin-bottom:15px;
      background:#2b2b2b;
      color:white;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#4285F4;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.03);
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Join Google Meet</h1>

  <div class="guide">
    Paste your Google Meet code or full invite link below.
    
    <div class="example">
      https://meet.google.com/<span class="highlight">abc-defg-hij</span>
    </div>

    The highlighted part is the meeting passcode 😌
  </div>

  <input 
    type="text" 
    id="meetCode" 
    placeholder="Enter Meet code or link"
  >

  <button onclick="joinMeet()">Join Meeting</button>
</div>

<script>
function joinMeet() {
    let input = document.getElementById("meetCode").value.trim();

    if (!input) {
        alert("Enter a Meet code first.");
        return;
    }

    // Full URL pasted
    if (input.startsWith("http")) {
        window.location.href = input;
        return;
    }

    // Assume Meet code
    window.location.href = "https://meet.google.com/" + input;
}
</script>

</body>
</html>
